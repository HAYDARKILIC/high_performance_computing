# Default LoRA configuration for causal language model fine-tuning.

model:
  name_or_path: meta-llama/Llama-2-7b-hf
  torch_dtype: bfloat16
  use_cache: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

training:
  output_dir: ./outputs/lora-llama2-7b
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: paged_adamw_32bit
  max_grad_norm: 0.3
  bf16: true
  logging_steps: 25
  save_strategy: epoch
  evaluation_strategy: epoch
  report_to: tensorboard
  seed: 42

data:
  dataset_name: tatsu-lab/alpaca
  max_seq_length: 1024
  packing: false
