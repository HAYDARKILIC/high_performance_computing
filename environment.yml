name: hpc-scaling
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch::pytorch>=2.3
  - pytorch::pytorch-cuda=12.1
  - pytorch::torchvision
  - pytorch::torchaudio
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - matplotlib>=3.7
  - pandas>=2.0
  - tqdm>=4.65
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - ipykernel>=6.25
  - pytest>=7.4
  - black>=24.0
  - ruff>=0.4
  - isort>=5.13
  - pip:
      - transformers>=4.40
      - datasets>=2.18
      - tokenizers>=0.15
      - accelerate>=0.30
      - peft>=0.10
      - evaluate>=0.4
      - bitsandbytes>=0.43
      - auto-gptq>=0.7
      - deepspeed>=0.14
      - nvitop>=1.3
      - py-spy>=0.3
